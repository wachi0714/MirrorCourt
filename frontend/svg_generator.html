    <style>
        * {
            box-sizing: border-box;
        }
        body {

            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #eee;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
            font-style: italic;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h2 {
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid rgba(255,215,0,0.5);
            display: inline-block;
            width: auto;
            margin-bottom: 15px;
        }
        .svg-preview {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .svg-preview svg {
            width: 200px;
            height: 200px;
            border-radius: 8px;
        }
        .code-area {
            background: #0a0e1a;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
        }
        .code-area pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 11px;
            color: #0f0;
            font-family: monospace;
            max-height: 150px;
            overflow: auto;
        }
        button {
            background: #ffd966;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:hover {
            background: #ffc107;
            transform: scale(1.02);
        }
        .copy-btn {
            background: #2c3e66;
            color: white;
        }
        .copy-btn:hover {
            background: #1e2a44;
        }
        .footer {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        .footer h3 {
            margin-top: 0;
        }
        .combined {
            font-family: monospace;
            font-size: 12px;
            background: #0a0e1a;
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
        }
        hr {
            border-color: rgba(255,255,255,0.2);
            margin: 20px 0;
        }
        @media (max-width: 960px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    // Endings object — maps key to SVG string (used by Member 1)
    const endings = {
        childhood: childhoodSVG,
        youth: youthSVG,
        midlife: midlifeSVG,
        mirror: mirrorSVG
    };

    // Display title and colour per ending
    const meta = {
        childhood: { name: "Childhood Wonder", color: "#6EC6F5" },
        youth: { name: "Blazing Youth", color: "#FFB347" },
        midlife: { name: "Settled Midlife", color: "#D4601A" },
        mirror: { name: "Shattered Serenity", color: "#C89098" }
    };

    // ======================= Render UI =======================
    function renderCards() {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        
        const keys = ['childhood', 'youth', 'midlife', 'mirror'];
        keys.forEach(key => {
            const svgString = endings[key];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h2 style="color:${meta[key].color === '#F8F9FA' ? '#333' : '#ffd966'}">✨ ${meta[key].name}</h2>
                <div class="svg-preview">
                    ${svgString}
                </div>
                <div class="code-area">
                    <pre id="pre_${key}">${escapeHtml(svgString)}</pre>
                </div>
                <button class="copy-btn" data-key="${key}">📋 Copy Single-line String</button>
                <button class="view-btn" data-svg="${escapeHtml(svgString)}">🔍 Full Preview</button>
            `;
            grid.appendChild(card);
        });

        // Bind copy buttons
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const key = btn.getAttribute('data-key');
                const svg = endings[key];
                copyToClipboard(svg);
                alert(`✅ Copied "${meta[key].name}" SVG as a single line`);
            });
        });

        // Full preview in new tab
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const rawSvg = btn.getAttribute('data-svg');
                const win = window.open();
                win.document.write(`
                    <html><head><title>SVG Preview</title><style>body{background:#333;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}</style></head>
                    <body>${rawSvg}</body>
                `);
            });
        });
    }

    // Build the full SVG object for Member 1
    function updateCombinedOutput() {
        // Clean JSON object containing the four ending SVG strings (Member 1 references this directly)
        const outputObj = {
            // Keys can be renamed to match contract requirements (e.g. 0 1 2 3)
            "Childhood Wonder": endings.childhood,
            "Blazing Youth": endings.youth,
            "Settled Midlife": endings.midlife,
            "Shattered Serenity": endings.mirror,
            // Array version also provided for index-based contract access
            "svgList": [endings.childhood, endings.youth, endings.midlife, endings.mirror]
        };
        
        const jsonStr = JSON.stringify(outputObj, null, 2);
        document.getElementById('combinedOutput').innerHTML = `<pre style="margin:0; white-space:pre-wrap; font-size:11px;">${escapeHtml(jsonStr)}</pre>`;
        
        document.getElementById('copyAllBtn').onclick = () => {
            copyToClipboard(jsonStr);
            alert('📦 Copied full JSON (contains 4 SVG strings)');
        };
    }

    // Helper: copy to clipboard
    function copyToClipboard(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Initialise
    renderCards();
    updateCombinedOutput();
</script>
